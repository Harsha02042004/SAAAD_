<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% block title %}SAAAD{% endblock %}</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background-color: #f8f9fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .col, [class*="col-"] {
      min-width: 0;
    }

    /* Navbar */
    .navbar {
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .navbar-brand {
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .nav-link {
      color: rgba(255,255,255,0.8) !important;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    .nav-link:hover {
      color: #ffffff !important;
    }

    .nav-link.active {
      color: #ffffff !important;
      font-weight: 500;
      border-bottom: 2px solid #0d6efd;
    }

    /* Layout */
    .main-container {
      max-width: 1400px;
      margin: auto;
    }

    /* Smooth UI feel */
    a, button {
      transition: all 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }
  </style>
</head>

<body>

  <!-- ========================= -->
  <!-- NAVBAR -->
  <!-- ========================= -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid px-4">

      <!-- LOGO -->
      <a class="navbar-brand" href="{{ url_for('homepage') }}">
        SAAAD
      </a>

      <!-- MOBILE TOGGLE -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- NAVIGATION -->
      <div class="collapse navbar-collapse" id="navMenu">

        <ul class="navbar-nav ms-4">

          <!-- HOME -->
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/' %}active{% endif %}"
               href="{{ url_for('homepage') }}">
              Home
            </a>
          </li>

          <!-- SEARCH -->
          <li class="nav-item">
            <a class="nav-link {% if '/search' in request.path %}active{% endif %}"
               href="{{ url_for('search') }}">
              Search
            </a>
          </li>

          <!-- BROWSE -->
          <li class="nav-item">
            <a class="nav-link {% if '/browse' in request.path %}active{% endif %}"
               href="{{ url_for('browse') }}">
              Browse All
            </a>
          </li>

          <!-- FAQ (NEW) -->
          <li class="nav-item">
            <a class="nav-link {% if '/faq' in request.path %}active{% endif %}"
               href="{{ url_for('faq') }}">
              FAQ
            </a>
          </li>

	<li class="nav-item">
  <a class="nav-link {% if '/contact' in request.path %}active{% endif %}"
     href="{{ url_for('contact') }}">
    Contact
  </a>
</li>

        </ul>

      </div>

    </div>
  </nav>


  <!-- ========================= -->
  <!-- MAIN CONTENT -->
  <!-- ========================= -->
  <div class="container-fluid px-4 py-4">
    <div class="main-container">
      {% block content %}{% endblock %}
    </div>
  </div>


  <!-- ========================= -->
  <!-- FOOTER -->
  <!-- ========================= -->
  <footer class="text-center text-muted small py-3">
    <div class="container">
      SAAAD- Sialic Acid Analogs ADME Prediction Database • Computational Cheminformatics Platform
    </div>
  </footer>


  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
